<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      プライバシー公約を実行時に構造的に強制する。connect-src 'none' で fetch/XHR/
      WebSocket などの通信を全面ブロックし、写真が端末外に出ないことをブラウザ側でも保証する。
      画像は data:（合成サムネ）と blob:（取り込みファイル）のみ許可。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1220" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f1220'/%3E%3Cpath d='M50 16 L74 52 Q50 45 26 52 Z' fill='%237c8cff'/%3E%3Cpath d='M28 70 Q28 46 50 46 Q72 46 72 70 L72 84 Q72 90 66 90 L34 90 Q28 90 28 84 Z' fill='%23fef1dc'/%3E%3Ccircle cx='42' cy='64' r='4' fill='%232a2f45'/%3E%3Ccircle cx='58' cy='64' r='4' fill='%232a2f45'/%3E%3C/svg%3E"
    />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f1220'/%3E%3Cpath d='M50 16 L74 52 Q50 45 26 52 Z' fill='%237c8cff'/%3E%3Ccircle cx='42' cy='64' r='5' fill='%23fef1dc'/%3E%3Ccircle cx='58' cy='64' r='5' fill='%23fef1dc'/%3E%3C/svg%3E" />
    <meta
      name="description"
      content="フォトこびと — 端末上の写真をブラウザ内だけで分析し、自動でアルバムを作ってくれる小さなお手伝い。写真はどこにも送信されません。"
    />
    <title>フォトこびと｜写真を自動でアルバムに</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
